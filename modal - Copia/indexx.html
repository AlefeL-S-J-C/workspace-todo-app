<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas - Funcional</title>

    <link href="content/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        .concluida {
            text-decoration: line-through;
            color: #6c757d;
            font-style: italic;
        }

        .extra-small {
            font-size: 0.785rem;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h3 class="mb-0">Minhas Tarefas</h3>
                        <small>Persistência com SQLite</small>
                    </div>

                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0">Lista de Tarefas</h5>
                            <button type="button" class="btn btn-primary" data-bs-toggle="modal"
                                data-bs-target="#modalNovaTarefa">
                                + Nova Tarefa
                            </button>
                        </div>

                        <div class="d-flex justify-content-center gap-2 mb-3">
                            <button type="button" class="btn btn-sm btn-outline-secondary active"
                                id="btnFiltroTodas">Todas</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                id="btnFiltroPendentes">Pendentes</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                id="btnFiltroConcluidos">Concluídas</button>
                        </div>

                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white border-end-0">
                                <img width="20" height="20" src="https://img.icons8.com/ios/50/search--v1.png"
                                    alt="search--v1" />
                            </span>
                            <input type="text" class="form-control border-start-0 ps-0" id="inputPesquisa"
                                placeholder="Pesquisar tarefa..." autocomplete="off">
                        </div>

                        <ul class="list-group" id="ListaTarefas"></ul>
                    </div>

                    <div class="card-footer d-flex justify-content-between align-items-center text-muted small">
                        <span id="contadorTarefas">0 tarefas pendentes</span>
                        <a href="#" id="btnLimparTodas" class="text-danger text-decoration-none">Limpar Todas</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalNovaTarefa" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nova Tarefa</h5>
                    <button type="button" class="btn-close" id="btnFecharModal" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formModalTarefa">
                        <div class="mb-3">
                            <label for="inputTituloModal" class="form-label">O que você precisa fazer?</label>
                            <input type="text" class="form-control" id="inputTituloModal" required autocomplete="off">
                        </div>

                        <div class="row mb-3">
                            <div class="col-6">
                                <label for="inputDataInicioModal" class="form-label">Data Inicial</label>
                                <input type="date" class="form-control" id="inputDataInicioModal" min="2026-01-01"
                                    required>
                            </div>
                            <div class="col-6">
                                <label for="inputDataFimModal" class="form-label">Data Final (com Hora)</label>
                                <input type="datetime-local" class="form-control" id="inputDataFimModal" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="inputDescricaoModal" class="form-label">Descrição (Opcional)</label>
                            <textarea class="form-control" id="inputDescricaoModal" rows="3"
                                placeholder="Detalhes sobre a tarefa..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="selectUrgenciaModal" class="form-label">Grau de Urgência</label>
                            <select class="form-select" id="selectUrgenciaModal" required></select>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-secondary me-2"
                                data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-success">Adicionar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditarTarefa" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Tarefa</h5>
                    <button type="button" class="btn-close" id="btnFecharModalEditar" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formModalEditarTarefa">
                        <input type="hidden" id="inputEditarId">

                        <div class="mb-3">
                            <label for="inputEditarTitulo" class="form-label">Alterar nome da tarefa:</label>
                            <input type="text" class="form-control" id="inputEditarTitulo" required autocomplete="off">
                        </div>

                        <div class="row mb-3">
                            <div class="col-6">
                                <label for="inputEditarDataInicio" class="form-label">Data Inicial</label>
                                <input type="date" class="form-control" id="inputEditarDataInicio" min="2026-01-01"
                                    required>
                            </div>
                            <div class="col-6">
                                <label for="inputEditarDataFim" class="form-label">Data Final (com Hora)</label>
                                <input type="datetime-local" class="form-control" id="inputEditarDataFim" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="inputEditarDescricao" class="form-label">Alterar Descrição:</label>
                            <textarea class="form-control" id="inputEditarDescricao" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="selectEditarUrgencia" class="form-label">Alterar Grau de Urgência</label>
                            <select class="form-select" id="selectEditarUrgencia" required></select>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-secondary me-2"
                                data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalVerTarefa" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title" id="verTarefaTitulo">Nome da Atividade</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row p-2 mb-3 bg-light rounded mx-0 text-center small text-muted">
                        <div class="col-6 border-end">
                            <strong>Início:</strong><br>
                            <span id="verTarefaDataInicio">-</span>
                        </div>
                        <div class="col-6">
                            <strong>Prazo Final:</strong><br>
                            <span id="verTarefaDataFim">-</span>
                        </div>
                    </div>
                    <div class="mb-3 text-center">
                        <span id="verTarefaUrgenciaBadge" class="badge p-2 fs-6 text-white w-100">Urgência</span>
                    </div>
                    <div>
                        <h6 class="fw-bold text-secondary">Descrição:</h6>
                        <div id="verTarefaDescricao" class="p-3 bg-white border rounded style-plain"
                            style="min-height: 80px; white-space: pre-wrap;">-</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="content/JS/bootstrap.bundle.min.js"></script>
    <script src="content/JS/sweetalert2.js"></script>
    <script src="content/JS/todo2.js"></script>
</body>

</html>
