<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>To-do padlet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link href="content/CSS/style.css" rel="stylesheet">
</head>

<body>
    <div class="main-wrapper">
        <div class="sidebar" id="sidebarMenu">
            <div class="px-2 mb-4 d-flex justify-content-between align-items-center">
                <h5 class="fw-bold m-0" style="color: var(--text-main, #000);">🚀 Workspace</h5>
                <button class="btn btn-sm btn-light d-lg-none" id="btnFecharSidebarMenu">&times;</button>
            </div>
            <div class="sidebar-title">
                <span>Minhas Páginas</span>
                <button class="btn btn-sm p-0 text-dark fw-bold" id="btnCriarPagina" style="color: var(--text-main, #000) !important;">+</button>
            </div>
            <div id="listaPaginas" class="px-1 flex-grow-1 overflow-y-auto"></div>

            <div class="px-3 mt-auto mb-3">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="switchDarkMode">
                    <label class="form-check-label text-muted small fw-bold" for="switchDarkMode">🌙 Modo Escuro</label>
                </div>
            </div>
        </div>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <div class="content-area">
            
            <div class="d-flex justify-content-between align-items-center border-bottom px-3 py-2 w-100" style="background-color: var(--bg-card, white);">
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-outline-dark btn-sm d-lg-none" id="btnAlternarSidebar">☰</button>
                    <h5 class="fw-bold m-0 text-truncate" id="tituloPaginaAtiva" style="max-width: 150px; color: var(--text-main, #000);">Selecione uma página</h5>
                </div>
                
                <div class="d-flex justify-content-end align-items-center gap-2 flex-nowrap ms-auto" style="overflow-x: auto; padding-bottom: 2px;">
                    <input type="text" id="inputPesquisa" class="form-control form-control-sm flex-shrink-0" placeholder="Pesquisar..." style="width: 150px;">
                    <button class="btn btn-warning btn-sm fw-bold text-nowrap flex-shrink-0 d-flex align-items-center gap-1" id="btnAbrirGaleriaNotas" data-bs-toggle="modal" data-bs-target="#modalGaleriaNotas">📝 Notas</button>
                    <button class="btn btn-primary btn-sm fw-bold text-nowrap flex-shrink-0 d-flex align-items-center gap-1" data-bs-toggle="modal" data-bs-target="#modalCriarTarefa" id="btnAbrirModalCriar">+ Add</button>
                    <button id="btnLimparTodas" class="btn btn-outline-danger btn-sm flex-shrink-0 d-flex align-items-center justify-content-center" style="width: 32px; height: 32px; border-radius: 50% !important;">&times;</button>
                </div>
            </div>

            <div class="px-3 pt-2">
                <span id="contadorTarefas" class="badge">0 tarefas pendentes</span>
            </div>

            <div class="kanban-container">
                <div class="kanban-column">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <div>
                            <span class="status-badge badge-todo">A Fazer</span>
                            <span class="text-muted small ms-2 fw-bold" id="countAFazer">0</span>
                        </div>
                    </div>
                    <div class="kanban-cards" id="colAFazer"></div>
                </div>

                <div class="kanban-column">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <div>
                            <span class="status-badge badge-doing">Em Andamento</span>
                            <span class="text-muted small ms-2 fw-bold" id="countEmAndamento">0</span>
                        </div>
                    </div>
                    <div class="kanban-cards" id="colEmAndamento"></div>
                </div>

                <div class="kanban-column">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <div>
                            <span class="status-badge badge-done">Concluído</span>
                            <span class="text-muted small ms-2 fw-bold" id="countConcluido">0</span>
                        </div>
                    </div>
                    <div class="kanban-cards" id="colConcluido"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCriarTarefa" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <form id="formModalTarefa" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Criar Nova Tarefa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" id="btnFecharModal"></button>
                </div>
                <div class="modal-body d-flex flex-column gap-3">
                    <div>
                        <label class="form-label fw-semibold">O que você precisa fazer?</label>
                        <input type="text" id="inputTituloModal" class="form-control" placeholder="Ex: Estudar Banco de Dados">
                    </div>
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Data Inicial</label>
                            <input type="date" id="inputDataInicioModal" class="form-control">
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Prazo Final</label>
                            <input type="datetime-local" id="inputDataFimModal" class="form-control">
                        </div>
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Descrição (Opcional)</label>
                        <textarea id="inputDescricaoModal" class="form-control" rows="3" placeholder="Detalhes da tarefa..."></textarea>
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Grau de Urgência</label>
                        <select id="selectUrgenciaModal" class="form-select" required></select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-success">Adicionar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal fade" id="modalEditarTarefa" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <form id="formModalEditarTarefa" class="modal-content">
                <input type="hidden" id="inputEditarId">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Editar Tarefa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" id="btnFecharModalEditar"></button>
                </div>
                <div class="modal-body d-flex flex-column gap-3">
                    <div>
                        <label class="form-label fw-semibold">Alterar nome da tarefa:</label>
                        <input type="text" id="inputEditarTitulo" class="form-control">
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Status do Quadro</label>
                        <select id="selectEditarStatus" class="form-select">
                            <option value="A Fazer">A Fazer</option>
                            <option value="Em Andamento">Em Andamento</option>
                            <option value="Concluído">Concluído</option>
                        </select>
                    </div>
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Data Inicial</label>
                            <input type="date" id="inputEditarDataInicio" class="form-control">
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Data Final</label>
                            <input type="datetime-local" id="inputEditarDataFim" class="form-control">
                        </div>
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Alterar Descrição:</label>
                        <textarea id="inputEditarDescricao" class="form-control" rows="3"></textarea>
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Alterar Grau de Urgência</label>
                        <select id="selectEditarUrgencia" class="form-select"></select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal fade" id="modalVerTarefa" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="verTarefaTitulo">Visualizar Detalhes</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body d-flex flex-column gap-3">
                    <div class="d-flex gap-2 flex-wrap">
                        <span class="badge" id="verTarefaUrgenciaBadge"></span>
                    </div>
                    <div class="bg-light p-3 rounded" style="background-color: var(--bg-hover) !important;">
                        <small class="text-muted d-block">Prazos e Cronograma:</small>
                        <span class="small d-block"><b>Início:</b> <span id="verTarefaDataInicio"></span></span>
                        <span class="small d-block"><b>Prazo Final:</b> <span id="verTarefaDataFim"></span></span>
                    </div>
                    <div>
                        <h6 class="fw-bold">Descrição</h6>
                        <p id="verTarefaDescricao" class="text-muted small bg-light p-2 rounded" style="background-color: var(--bg-hover) !important;"></p>
                    </div>
                    <hr>
                    <div>
                        <h6 class="fw-bold mb-2">📋 Subtarefas Checklist</h6>
                        <form id="formNovaSubtarefa" class="input-group input-group-sm mb-2">
                            <input type="text" id="inputTextoSubtarefa" class="form-control" placeholder="Adicionar nova subtarefa..." required>
                            <button type="submit" class="btn btn-dark">+ Add</button>
                        </form>
                        <ul class="list-group" id="listaSubtarefas"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalGaleriaNotas" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title fw-bold">📝 Bloco de Notas Digital</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <button class="btn btn-dark mb-3 w-100" data-bs-toggle="modal" data-bs-target="#modalCanvas" id="btnNovaNota">+ Criar Nova Nota Escrita</button>
                    <div id="listaNotas" class="d-flex flex-wrap gap-2 justify-content-center"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCanvas" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-fullscreen-lg-down modal-xl">
            <div class="modal-content bg-light">
                <div class="modal-header flex-wrap gap-2 justify-content-between align-items-center">
                    <input type="text" id="inputTituloNota" class="form-control fw-bold border-0 bg-transparent fs-5" placeholder="Título da Anotação..." style="max-width: 200px;">
                    <div class="d-flex gap-2 align-items-center">
                        <select id="selectTipoFolha" class="form-select form-select-sm" style="width: auto;">
                            <option value="paper-blank">Folha em Branco</option>
                            <option value="paper-ruled">Pautada</option>
                            <option value="paper-grid">Quadriculada</option>
                            <option value="paper-dotted">Pontilhada</option>
                        </select>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" id="btnFecharCanvas"></button>
                    </div>
                </div>
                <div class="modal-body p-2 d-flex flex-column align-items-center">
                    <div class="d-flex gap-2 mb-2 bg-white p-2 rounded shadow-sm w-100 justify-content-center flex-wrap align-items-center">
                        <div class="d-flex align-items-center gap-1">
                            <label class="small fw-bold mb-0">Cor:</label>
                            <input type="color" id="corCaneta" class="form-control form-control-color p-0 border-0" value="#000000" style="width:30px; height:30px;">
                        </div>
                        <div class="d-flex align-items-center gap-1">
                            <label class="small fw-bold mb-0">Tam:</label>
                            <input type="range" id="espessuraCaneta" class="form-range" min="1" max="20" value="3" style="width: 70px;">
                        </div>
                        <button class="btn btn-sm btn-outline-secondary py-1" id="btnBorracha">Borracha</button>
                        <button class="btn btn-sm btn-outline-danger py-1" id="btnLimparCanvas">Limpar</button>
                    </div>

                    <div class="d-flex gap-2 mb-2 w-100 justify-content-center align-items-center flex-wrap">
                        <button class="btn btn-sm btn-dark fw-bold px-2" id="btnPaginaAnterior">&lt; Ant</button>
                        <span class="badge bg-secondary" id="lblPaginaAtual">Página 1 de 1</span>
                        <button class="btn btn-sm btn-dark fw-bold px-2" id="btnProximaPagina">Prox &gt;</button>
                        <button class="btn btn-sm btn-success fw-bold px-2" id="btnNovaPaginaNota">+ Pág</button>
                    </div>

                    <div class="canvas-wrapper">
                        <canvas id="drawCanvas" width="850" height="500" class="paper-blank"></canvas>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" id="btnSalvarNota">💾 Salvar Nota</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="todo2.js"></script>
</body>
</html>
